name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'src/rf_trace_viewer/**'
      - 'tests/fixtures/diverse_suite.json'
      - 'tests/fixtures/diverse_suite_logs.json'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install package
        run: pip install -e .

      - name: Generate demo report
        run: |
          mkdir -p _site
          rf-trace-report \
            tests/fixtures/diverse_suite.json \
            --logs-file tests/fixtures/diverse_suite_logs.json \
            --title "RF Trace Report — Interactive Demo" \
            -o _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
