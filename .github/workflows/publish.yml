name: Publish to PyPI

# Disabled: PyPI publishing requires either a valid PYPI_TOKEN secret or
# trusted publisher (OIDC) configuration on pypi.org. Re-enable when ready.
# To set up trusted publishers, see:
# https://docs.pypi.org/trusted-publishers/creating-a-project-through-oidc/
on:
  workflow_dispatch:
  # release:
  #   types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
