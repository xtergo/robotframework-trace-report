name: Publish OCI Image

on:
  release:
    types: [published]

jobs:
  publish-oci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Strip leading 'v' if present (v1.2.3 -> 1.2.3)
          VERSION="${TAG#v}"
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Verify version alignment with PyPI package
        run: |
          PYPI_VERSION=$(python3 -c "
          import re
          with open('pyproject.toml') as f:
              content = f.read()
          match = re.search(r'version\s*=\s*\"([^\"]+)\"', content)
          print(match.group(1) if match else 'unknown')
          ")
          echo "PyPI version: $PYPI_VERSION"
          echo "Release version: ${{ steps.version.outputs.version }}"
          if [ "$PYPI_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::warning::OCI image version (${{ steps.version.outputs.version }}) does not match pyproject.toml version ($PYPI_VERSION)"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push viewer OCI image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:sha-${{ steps.version.outputs.short_sha }}
            ghcr.io/${{ github.repository }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push MCP trace analyzer image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.mcp
          push: true
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository }}-mcp:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}-mcp:sha-${{ steps.version.outputs.short_sha }}
            ghcr.io/${{ github.repository }}-mcp:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=MCP Trace Analyzer
            org.opencontainers.image.description=MCP server for AI-assisted Robot Framework trace analysis
