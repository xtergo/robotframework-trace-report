# Kustomize manifests for deploying a minimal SigNoz + ClickHouse stack
# into a kind cluster for integration testing.
#
# Usage: kubectl apply -k test/kind/signoz/
#
# This is NOT a production SigNoz deployment — it is a single-replica,
# ephemeral stack for running integration tests against trace-report.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - zookeeper.yaml
  - clickhouse.yaml
  - clickhouse-config.yaml
  - otel-collector.yaml
  - otel-config.yaml
  - signoz.yaml
  - schema-migrator.yaml
