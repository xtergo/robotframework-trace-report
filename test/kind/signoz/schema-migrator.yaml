# Telemetry store migrator Job — creates ClickHouse tables required by SigNoz.
# Replaces the deprecated signoz-schema-migrator with the otel-collector's
# built-in migration commands (required for SigNoz >= v0.113).
# Must complete before SigNoz can serve queries.
apiVersion: batch/v1
kind: Job
metadata:
  name: schema-migrator-sync
  labels:
    app.kubernetes.io/name: schema-migrator
    app.kubernetes.io/part-of: signoz-test
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: schema-migrator
        app.kubernetes.io/part-of: signoz-test
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrator
          image: signoz/signoz-otel-collector:v0.144.1
          env:
            - name: SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN
              value: tcp://clickhouse:9000
            - name: SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER
              value: cluster
            - name: SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION
              value: "true"
            - name: SIGNOZ_OTEL_COLLECTOR_TIMEOUT
              value: "10m"
          command: ["/bin/sh"]
          args:
            - -c
            - |
              /signoz-otel-collector migrate bootstrap &&
              /signoz-otel-collector migrate sync up &&
              /signoz-otel-collector migrate async up
