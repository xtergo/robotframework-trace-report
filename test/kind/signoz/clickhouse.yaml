# ClickHouse single-replica StatefulSet for integration testing.
# The Service MUST be named "clickhouse" — trace-report's dev overlay
# configmap sets CLICKHOUSE_HOST=clickhouse.
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/part-of: signoz-test
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: http
      port: 8123
      targetPort: 8123
    - name: native
      port: 9000
      targetPort: 9000
  selector:
    app.kubernetes.io/name: clickhouse
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/part-of: signoz-test
spec:
  serviceName: clickhouse
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: clickhouse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clickhouse
        app.kubernetes.io/part-of: signoz-test
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:25.12.5
          env:
            - name: CLICKHOUSE_SKIP_USER_SETUP
              value: "1"
          ports:
            - containerPort: 8123
              name: http
            - containerPort: 9000
              name: native
          volumeMounts:
            - name: clickhouse-config
              mountPath: /etc/clickhouse-server/config.d
          startupProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /ping
              port: 8123
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: clickhouse-config
          configMap:
            name: clickhouse-config
