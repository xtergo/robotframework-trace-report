# ConfigMap containing the OpenTelemetry Collector configuration.
# Mirrors the docker-compose otel-conf init container output.
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: signoz-test
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        send_batch_size: 100
        send_batch_max_size: 200
        timeout: 1s
      signozspanmetrics/delta:
        metrics_exporter: signozclickhousemetrics
        metrics_flush_interval: 60s
        latency_histogram_buckets:
          [100us, 1ms, 2ms, 6ms, 10ms, 50ms, 100ms, 250ms, 500ms,
           1000ms, 1400ms, 2000ms, 5s, 10s, 20s, 40s, 60s]
        dimensions_cache_size: 100000
        aggregation_temporality: AGGREGATION_TEMPORALITY_DELTA
        enable_exp_histogram: true
        dimensions:
          - name: service.namespace
            default: default
          - name: deployment.environment
            default: default

    exporters:
      clickhousetraces:
        datasource: tcp://clickhouse:9000/signoz_traces
        low_cardinal_exception_grouping: false
        use_new_schema: true
      signozclickhousemetrics:
        dsn: tcp://clickhouse:9000/signoz_metrics
      clickhouselogsexporter:
        dsn: tcp://clickhouse:9000/signoz_logs
        timeout: 10s
        use_new_schema: true

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [signozspanmetrics/delta, batch]
          exporters: [clickhousetraces]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [signozclickhousemetrics]
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [clickhouselogsexporter]
