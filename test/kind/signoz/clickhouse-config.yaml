# ConfigMap containing ClickHouse cluster.xml configuration.
# Defines the single-shard cluster and ZooKeeper connection
# required by SigNoz schema migrations.
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-config
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/part-of: signoz-test
data:
  cluster.xml: |
    <clickhouse>
      <remote_servers>
        <cluster>
          <shard>
            <replica>
              <host>clickhouse</host>
              <port>9000</port>
            </replica>
          </shard>
        </cluster>
      </remote_servers>
      <zookeeper>
        <node>
          <host>zookeeper</host>
          <port>2181</port>
        </node>
      </zookeeper>
    </clickhouse>
