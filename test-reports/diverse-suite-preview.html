        var newStart = data.newStart;
        var oldStart = data.oldStart;
        var nowSec = Date.now() / 1000;
        var newEnd = data.newEnd || nowSec;
        var oldEnd = data.oldEnd || nowSec;
        console.log('[live] load-window-changed: newStart=' + newStart +
          ' oldStart=' + oldStart + ' newEnd=' + newEnd + ' oldEnd=' + oldEnd);

        // Detect full reset: new window has zero overlap with old window.
        // When newStart >= oldEnd or newEnd <= oldStart, the ranges don't
        // overlap — discard cached spans and reset filter counter so
        // initSearch is called when the fresh span set arrives.
        var isFullReset = (newStart >= oldEnd) || (newEnd <= oldStart);
        if (isFullReset) {
          console.log('[live] Full reset: no overlap between old [' +
            oldStart + ',' + oldEnd + '] and new [' +
            newStart + ',' + newEnd + '] — resetting filter counter');
          allSpans = [];
          seenSpanIds = {};
          _lastFilterSpanCount = 0;
          _loadWindowState.totalCachedSpans = 0;
          _connectionState.earliestSpanNs = 0;
        }

        // Update activeWindowStart via the public API (handles clamping)
        window.RFTraceViewer.setActiveWindowStart(newStart);

        // Incremental delta load: prune spans outside the new Load_Window
        // before rebuilding the model. This ensures allSpans only contains
        // spans within [activeWindowStart, now] after a partial-overlap
        // range change (Design §7 — Incremental Delta Load).
        var prunedCount = 0;
        if (!isFullReset) {
          var winStart = _loadWindowState.activeWindowStart;
          var winStartNs = winStart * 1e9;
          var beforeLen = allSpans.length;
          var pruned = [];
          for (var pi = 0; pi < allSpans.length; pi++) {
            if (allSpans[pi].start_time < winStartNs) {
              pruned.push(allSpans[pi]);
            }
          }
          if (pruned.length > 0) {
            // Remove pruned span IDs from dedup map so they can be
            // re-fetched if the window moves back later.
            for (var ri = 0; ri < pruned.length; ri++) {
              delete seenSpanIds[pruned[ri].span_id];
            }
            allSpans = allSpans.filter(function (s) {
              return s.start_time >= winStartNs;
            });
            _loadWindowState.totalCachedSpans = allSpans.length;
            _lastFilterSpanCount = 0; // force initSearch re-init
            prunedCount = pruned.length;
            _connectionState.earliestSpanNs = _computeEarliestSpanNs();
            console.log('[live] Pruned ' + prunedCount +
              ' out-of-range spans (before winStart=' + winStart +
              '): ' + beforeLen + ' → ' + allSpans.length);
          }
        }

        // Only fetch when dragging backward (loading older data)
        console.log('[live] load-window-changed decision: newStart=' + newStart +
          ' < oldStart=' + oldStart + '? ' + (newStart < oldStart));
        if (newStart < oldStart) {
          _deltaFetch(newStart, oldStart);
        } else if (prunedCount > 0) {
          if (allSpans.length === 0) {
            // All spans pruned (e.g. 7d → 15m with no recent data).
            // Reset watermark so polling fetches from the new window start.
            lastSeenNs = Math.max(0, _loadWindowState.activeWindowStart * 1e9);
            console.log('[live] Pruned to 0 spans — resetting lastSeenNs to ' + lastSeenNs + ' and re-fetching');
            _deltaFetch(_loadWindowState.activeWindowStart, Date.now() / 1000);
          } else {
            // Window moved forward with no new fetch needed — rebuild
            // to reflect pruned spans in the model and filter counters.
            _rebuildAndRender();
          }
        }

        // Emit active-window-start so Timeline can sync marker/overlay position
        if (window.RFTraceViewer && window.RFTraceViewer.emit) {
          window.RFTraceViewer.emit('active-window-start', {
            activeWindowStart: _loadWindowState.activeWindowStart
          });
        }
      });
    }
  });

  /* ── 3. Polling lifecycle ──────────────────────────────────────── */

  /* ── Resource metrics polling (CPU/RAM from /api/v1/resources) ── */

  var _resourceTimer = null;
  var RESOURCE_POLL_MS = 10000; // 10 seconds

  function _startResourcePolling() {
    _pollResources(); // immediate first fetch
    _resourceTimer = setInterval(_pollResources, RESOURCE_POLL_MS);
  }

  function _pollResources() {
    fetch(_appendSid('/api/v1/resources'))
      .then(function (res) { return res.ok ? res.json() : null; })
      .then(function (data) {
        if (!data) return;
        _connectionState.rssMb = data.rss_mb;
        _connectionState.rssLimitMb = data.rss_limit_mb;
        _connectionState.rssPct = data.rss_pct;
        _connectionState.cpuPct = data.cpu_pct;
        _connectionState.cpuLimitMc = data.cpu_limit_mc;
        // Build combined summary strings: usage / request / limit
        var rss = data.rss_mb != null ? Math.round(data.rss_mb) : '—';
        var memReq = data.mem_request_mb != null ? Math.round(data.mem_request_mb) : '—';
        var memLim = data.rss_limit_mb != null ? Math.round(data.rss_limit_mb) : '∞';
        _connectionState.memSummary = rss + ' / ' + memReq + ' / ' + memLim + ' MB';
        var cpuUse = data.cpu_pct != null ? data.cpu_pct + '%' : '—';
        var cpuReq = data.cpu_request_mc != null ? data.cpu_request_mc + 'm' : '—';
        var cpuLim = data.cpu_limit_mc != null ? data.cpu_limit_mc + 'm' : '∞';
        _connectionState.cpuSummary = cpuUse + ' / ' + cpuReq + ' / ' + cpuLim;
        _emitDiagnostics();
      })
      .catch(function () { /* silent — resource metrics are best-effort */ });
  }

  function _onAppReady() {
    appReady = true;
    _createStatusBar();

    // Apply lookback: set initial watermark so first poll only fetches recent spans
    if (_lookbackNs > 0 && provider === 'signoz') {
      var nowNs = Date.now() * 1e6; // ms → ns (approximate, good enough for lookback)
      lastSeenNs = Math.max(0, nowNs - _lookbackNs);
      console.log('[live] Lookback active: fetching spans from last ' +
        Math.round(_lookbackNs / 1e9) + 's (since_ns=' + lastSeenNs + ')');

      // Init timeline with empty lookback window so the time axis is visible
      var timelineSection = document.querySelector('.timeline-section');
      if (timelineSection && !_timelineInitialized && typeof window.initTimeline === 'function') {
        var nowSec = Date.now() / 1000;
        var lookbackSec = _lookbackNs / 1e9;
        var emptyModel = _emptyModel();
        emptyModel.start_time = (nowSec - lookbackSec) * 1e9;
        emptyModel.end_time = nowSec * 1e9;
        // Initialize activeWindowStart to the left edge of the lookback window.
        // This makes the blue load-start marker visible from the start.
        _loadWindowState.activeWindowStart = nowSec - lookbackSec;
        window.initTimeline(timelineSection, emptyModel);
        _timelineInitialized = true;
        // Emit active-window-start so the timeline shows the blue marker immediately
        if (window.RFTraceViewer && window.RFTraceViewer.emit) {
          window.RFTraceViewer.emit('active-window-start', {
            activeWindowStart: _loadWindowState.activeWindowStart
          });
        }
        // Highlight the preset button matching the default lookback
        if (typeof window.setActivePreset === 'function') {
          window.setActivePreset(lookbackSec);
        }
        console.log('[live] Initialized empty timeline: ' +
          new Date((nowSec - lookbackSec) * 1000).toISOString().substr(11, 8) +
          ' → ' + new Date(nowSec * 1000).toISOString().substr(11, 8));
      }
    }
    _startPolling();
    _startResourcePolling();
    _listenVisibility();
    // Do an immediate first poll
    _poll();

    // Wall-clock advance: every 10s, push the timeline right edge to now.
    setInterval(function () {
      if (typeof window.advanceTimelineNow === 'function') {
        window.advanceTimelineNow();
      }
    }, 10000);
  }

  function _startPolling() {
    if (pollTimer) return;
    pollTimer = setInterval(_poll, POLL_MS);
  }

  function _stopPolling() {
    if (pollTimer) {
      clearInterval(pollTimer);
      pollTimer = null;
    }
  }

  function _setPaused(paused) {
    _paused = paused;
    if (paused) {
      _setStatus('Paused');
      _stopPolling();
    } else {
      _setStatus('Live');
      _startPolling();
      _poll();
    }
  }

  /** Pause when tab is hidden, resume when visible. */
  function _listenVisibility() {
    document.addEventListener('visibilitychange', function () {
      if (document.visibilityState === 'hidden') {
        _stopPolling();
      } else {
        if (!_paused) {
          _startPolling();
          _poll(); // immediate catch-up
        }
      }
    });
  }

  /* ── 4. Fetch + parse ──────────────────────────────────────────── */

  // Req 8.6 guarantee: live polling is independent of time navigation state.
  // _poll/_pollJson/_pollSigNoz never read viewStart, viewEnd, _navHistory,
  // or any preset/time-picker flag from timeline.js.  Navigation actions
  // (presets, absolute time picker, undo/redo) only modify the view window
  // and emit load-window-changed — they never stop or gate polling.
  function _poll() {
    if (polling) return;
    _connectionState.retryCountdownSec = 0;
    if (provider === 'signoz') {
      _pollSigNoz();
    } else {
      _pollJson();
    }
  }

  function _pollJson() {
    polling = true;
    var spansBefore = allSpans.length;

    fetch(_appendSid('/traces.json?offset=' + byteOffset))
      .then(function (res) {
        if (!res.ok) {
          if (res.status === 401) {
            _setStatus('Unauthorized', 'Token expired');
            _connectionState.retryCount++;
            _connectionState.lastError = 'HTTP 401';
            throw new Error('HTTP 401');
          }
          if (res.status === 429) {
            _onPollError('Rate limited');
            throw new Error('HTTP 429');
          }
          if (res.status === 502) {
            return res.text().then(function (body) {
              if (body && body.toLowerCase().indexOf('clickhouse') !== -1) {
                _onPollError('ClickHouse timeout');
              } else {
                _onPollError('HTTP 502');
              }
              throw new Error('HTTP 502');
            });
          }
          _onPollError('HTTP ' + res.status);
          throw new Error('HTTP ' + res.status);
        }
        var newOffset = res.headers.get('X-File-Offset');
        if (newOffset !== null) byteOffset = parseInt(newOffset, 10);
        return res.text();
      })
      .then(function (text) {
        // Any successful HTTP response = backend is alive → Live
        _setStatus('Live');
        _connectionState.lastSuccessTs = Date.now();
        _connectionState.lastError = '';
        _connectionState.retryCount = 0;

        if (text && text.length > 0) {
          try {
            _ingestNdjson(text);
          } catch (e) {
            _onPollError(e.message || 'JSON parse failure');
            return;
          }
          var newSpans = allSpans.length - spansBefore;
          _updateTelemetry(newSpans);
          if (newSpans > 0) {
            _rebuildAndRender();
          }
        } else {
          _updateTelemetry(0);
        }
      })
      .catch(function (err) {
        // Network-level fetch rejection (no HTTP response at all)
        if (!_connectionState.lastError) {
          _onPollError(err.message || 'Network error');
        }
        console.warn('[live] poll error:', err.message);
      })
      .finally(function () {
        _emitDiagnostics();
        polling = false;
        // Restart countdown if still in a retry-worthy state
        if (_connectionState.primaryStatus === 'Disconnected' || _connectionState.primaryStatus === 'Retrying') {
          _startRetryCountdown();
        }
      });
  }

  function _pollSigNoz() {
    polling = true;
    // Apply 5-second lookback buffer to handle out-of-order span arrival.
    // Spans may arrive with timestamps slightly before the watermark due to:
    // - Concurrent test execution
    // - Network/processing delays
    // - Clock skew between components
    var lookbackBufferNs = 5 * 1e9; // 5 seconds in nanoseconds
    var pollFromNs = Math.max(0, lastSeenNs - lookbackBufferNs);
    var url = '/api/spans?since_ns=' + pollFromNs;
    var svc = _serviceFilter;
    // Always send service param so server doesn't fall back to its config default
    // Empty string = no filter (all services)
    url += '&service=' + encodeURIComponent(svc || '');
    if (_executionFilter) {
      url += '&execution_id=' + encodeURIComponent(_executionFilter);
    }

    fetch(_appendSid(url))
      .then(function (res) {
        if (res.status === 429) {
          // Rate limited — exponential backoff
          _onPollError('Rate limited');
          return res.json().then(function (body) {
            _showNotification('Rate limited by SigNoz. Backing off\u2026');
            backoffMs = Math.min(backoffMs * 2, 30000);
            _reschedulePolling(backoffMs);
            throw new Error('rate_limited');
          });
        }
        if (res.status === 401) {
          _setStatus('Unauthorized', 'Token expired');
          _connectionState.retryCount++;
          _connectionState.lastError = 'HTTP 401 authentication failed';
          return res.json().then(function (body) {
            _showAuthError(body.message || 'Authentication failed');
            throw new Error('auth_error');
          }).catch(function (e) {
            if (e.message === 'auth_error') throw e;
            _showAuthError('Authentication failed (401)');
            throw new Error('auth_error');
          });
        }
        if (res.status === 502) {
          return res.text().then(function (body) {
            if (body && body.toLowerCase().indexOf('clickhouse') !== -1) {
              _onPollError('ClickHouse timeout');
            } else {
              _onPollError('HTTP 502');
            }
            throw new Error('HTTP 502');
          });
        }
        if (!res.ok) {
          _onPollError('HTTP ' + res.status);
          return res.json().then(function (body) {
            throw new Error(body.message || 'HTTP ' + res.status);
          }).catch(function (e) {
            if (e.message && e.message.indexOf('HTTP') === -1) throw e;
            throw new Error('HTTP ' + res.status);
          });
        }
        // Success — reset backoff and clear any auth error banner
        backoffMs = POLL_MS;
        _clearAuthError();
        return res.json();
      })
      .then(function (data) {
        // Any successful HTTP response = backend is alive → Live
        _setStatus('Live');
        _connectionState.lastSuccessTs = Date.now();
        _connectionState.lastError = '';
        _connectionState.retryCount = 0;

        if (!data || !data.spans) {
          _updateTelemetry(0);
          return;
        }
        // Track earliest DB span timestamp from server (cached, updates slowly)
        if (data.earliest_db_span_ns && data.earliest_db_span_ns > 0) {
          _connectionState.earliestDbSpanNs = data.earliest_db_span_ns;
        }
        var spans = data.spans;
        if (spans.length > 0) {
          var added = _ingestSigNozSpans(spans);
          _updateTelemetry(added);
          if (added > 0) {
            _rebuildAndRender();
          }
        } else {
          _updateTelemetry(0);
        }
      })
      .catch(function (err) {
        if (err.message === 'rate_limited') return; // already handled above
        if (err.message === 'auth_error') return; // already handled above
        if (err.message === 'HTTP 502') return; // already handled above
        // Network-level fetch rejection (no HTTP response at all)
        if (_connectionState.primaryStatus !== 'Disconnected' || !_connectionState.lastError) {
          _onPollError(err.message || 'Network error');
        }
        console.warn('[live] SigNoz poll error:', err.message);
        _showNotification('SigNoz error: partial data may be shown');
      })
      .finally(function () {
        _emitDiagnostics();
        polling = false;
        // Restart countdown if still in a retry-worthy state
        if (_connectionState.primaryStatus === 'Disconnected' || _connectionState.primaryStatus === 'Retrying') {
          _startRetryCountdown();
        }
      });
  }

  /** Parse incremental NDJSON text, handling partial trailing lines. */
  function _computeEarliestSpanNs() {
    if (allSpans.length === 0) return 0;
    var earliest = allSpans[0].start_time;
    for (var i = 1; i < allSpans.length; i++) {
      if (allSpans[i].start_time < earliest) earliest = allSpans[i].start_time;
    }
    return earliest;
  }

  function _ingestNdjson(text) {
    if (_spanCapReached) return;

    var combined = lineBuffer + text;
    var lines = combined.split('\n');
    // Last element may be incomplete — buffer it
    lineBuffer = lines.pop() || '';

    for (var i = 0; i < lines.length; i++) {
      if (allSpans.length >= MAX_SPANS) {
        _onSpanCapReached();
        return;
      }
      var line = lines[i].trim();
      if (!line) continue;
      try {
        var obj = JSON.parse(line);
        var spans = _extractSpans(obj);
        for (var j = 0; j < spans.length; j++) {
          if (allSpans.length >= MAX_SPANS) { _onSpanCapReached(); return; }
          allSpans.push(spans[j]);
        }
      } catch (e) {
        console.warn('[live] skipping malformed line:', e.message);
      }
    }
  }

  /** Ingest TraceSpan objects from SigNoz /api/spans response.
   *  Returns the number of NEW (not previously seen) spans added. */
  function _ingestSigNozSpans(spans) {
    if (_spanCapReached) return 0;

    var newCount = 0;
    for (var i = 0; i < spans.length; i++) {
      // Check span cap before each insert
      if (allSpans.length >= MAX_SPANS) {
        _onSpanCapReached();
        break;
      }

      var s = spans[i];
      var spanId = (s.span_id || '').toLowerCase();

      // Browser-side dedup: skip spans we've already ingested
      if (seenSpanIds[spanId]) continue;
      seenSpanIds[spanId] = true;
      newCount++;

      var startNs = s.start_time_ns || 0;
      var durationNs = s.duration_ns || 0;
      var endNs = startNs + durationNs;

      // Update lastSeenNs watermark
      if (endNs > lastSeenNs) lastSeenNs = endNs;

      // Map status: "OK" → "STATUS_CODE_OK", "ERROR" → "STATUS_CODE_ERROR", else ""
      var statusCode = '';
      if (s.status === 'OK') statusCode = 'STATUS_CODE_OK';
      else if (s.status === 'ERROR') statusCode = 'STATUS_CODE_ERROR';

      // Merge resource_attributes into attributes (span attrs take precedence)
      var attrs = {};
      var ra = s.resource_attributes || {};
      var key;
      for (key in ra) { attrs[key] = ra[key]; }
      var sa = s.attributes || {};
      for (key in sa) { attrs[key] = sa[key]; }

      // Discover service names for the filter UI
      var svcName = attrs['service.name'] || '';
      if (svcName && !_knownServices[svcName]) {
        _knownServices[svcName] = true;
        _onServiceDiscovered(svcName);
      }

      allSpans.push({
        trace_id: (s.trace_id || '').toLowerCase(),
        span_id: (s.span_id || '').toLowerCase(),
        parent_span_id: (s.parent_span_id || '').toLowerCase(),
        name: s.name || '',
        start_time: startNs,
        end_time: endNs,
        status_code: statusCode,
        attributes: attrs,
        events: s.events || []
      });

      // Track cached span count per service
      if (svcName && _serviceStates[svcName]) {
        _serviceStates[svcName].cachedSpanCount++;
        if (!_serviceStates[svcName].cachedRange) {
          _serviceStates[svcName].cachedRange = { start: startNs, end: endNs };
        } else {
          if (startNs < _serviceStates[svcName].cachedRange.start) {
            _serviceStates[svcName].cachedRange.start = startNs;
          }
          if (endNs > _serviceStates[svcName].cachedRange.end) {
            _serviceStates[svcName].cachedRange.end = endNs;
          }
        }
      }
    }
    _connectionState.lastSeenNs = lastSeenNs;
    _connectionState.totalSpans = allSpans.length;
    // Recompute earliest span from allSpans (covers ingestion + pruning)
    _connectionState.earliestSpanNs = _computeEarliestSpanNs();
    return newCount;
  }

  /* ── 5. OTLP span extraction ───────────────────────────────────── */

  /**
   * Extract flat span objects from an ExportTraceServiceRequest.
   * Supports both snake_case and camelCase OTLP field names.
   */
  function _extractSpans(req) {
    var result = [];
    var resourceSpans = req.resource_spans || req.resourceSpans || [];
    for (var r = 0; r < resourceSpans.length; r++) {
      var rs = resourceSpans[r];
      var resource = rs.resource || {};
      var resourceAttrs = _flattenAttributes(resource.attributes || []);
      var scopeSpans = rs.scope_spans || rs.scopeSpans || [];
      for (var s = 0; s < scopeSpans.length; s++) {
        var ss = scopeSpans[s];
        var spans = ss.spans || [];
        for (var sp = 0; sp < spans.length; sp++) {
          var raw = spans[sp];
          var parsed = _parseSpan(raw, resourceAttrs);
          result.push(parsed);
        }
      }
    }
    return result;
  }

  /** Parse a single OTLP span into our internal flat format. */
  function _parseSpan(raw, resourceAttrs) {
    var attrs = _flattenAttributes(raw.attributes || []);
    // Merge resource attributes (span attrs take precedence)
    var key;
    for (key in resourceAttrs) {
      if (!(key in attrs)) attrs[key] = resourceAttrs[key];
    }

    var events = [];
    var rawEvents = raw.events || [];
    for (var e = 0; e < rawEvents.length; e++) {
      var ev = rawEvents[e];
      events.push({
        name: ev.name || '',
        time: ev.time_unix_nano || ev.timeUnixNano || '0',
        attributes: _flattenAttributes(ev.attributes || [])
      });
    }

    return {
      trace_id: _normalizeHex(raw.trace_id || raw.traceId || ''),
      span_id: _normalizeHex(raw.span_id || raw.spanId || ''),
      parent_span_id: _normalizeHex(raw.parent_span_id || raw.parentSpanId || ''),
      name: raw.name || '',
      start_time: _parseNano(raw.start_time_unix_nano || raw.startTimeUnixNano || '0'),
      end_time: _parseNano(raw.end_time_unix_nano || raw.endTimeUnixNano || '0'),
      status_code: _otlpStatusCode(raw.status),
      attributes: attrs,
      events: events
    };
  }

  /** Flatten OTLP attribute array [{key, value}] → plain object. */
  function _flattenAttributes(arr) {
    var out = {};
    if (!arr || !arr.length) return out;
    for (var i = 0; i < arr.length; i++) {
      var a = arr[i];
      out[a.key] = _extractAttrValue(a.value || {});
    }
    return out;
  }

  /** Extract the actual value from an OTLP attribute value object. */
  function _extractAttrValue(v) {
    if (v.string_value !== undefined) return v.string_value;
    if (v.stringValue !== undefined) return v.stringValue;
    if (v.int_value !== undefined) return v.int_value;
    if (v.intValue !== undefined) return v.intValue;
    if (v.double_value !== undefined) return v.double_value;
    if (v.doubleValue !== undefined) return v.doubleValue;
    if (v.bool_value !== undefined) return v.bool_value;
    if (v.boolValue !== undefined) return v.boolValue;
    if (v.array_value !== undefined) return v.array_value;
    if (v.arrayValue !== undefined) return v.arrayValue;
    if (v.bytes_value !== undefined) return v.bytes_value;
    if (v.bytesValue !== undefined) return v.bytesValue;
    return '';
  }

  /** Normalize hex ID to lowercase. */
  function _normalizeHex(id) {
    return (typeof id === 'string') ? id.toLowerCase() : '';
  }

  /** Parse nanosecond timestamp string/number to integer. */
  function _parseNano(val) {
    if (typeof val === 'number') return val;
    if (typeof val === 'string') return parseInt(val, 10) || 0;
    return 0;
  }

  /** Map OTLP status to a code string. */
  function _otlpStatusCode(status) {
    if (!status) return '';
    var code = status.code || '';
    if (typeof code === 'number') {
      if (code === 1) return 'STATUS_CODE_OK';
      if (code === 2) return 'STATUS_CODE_ERROR';
      return '';
    }
    return String(code);
  }

  /* ── 6. Model building ─────────────────────────────────────────── */

  function _rebuildAndRender() {
    var model = _buildModel(allSpans);
    console.log('[live] rebuildAndRender: allSpans=' + allSpans.length +
      ', rootSuites=' + model.suites.length +
      ', stats.total_tests=' + (model.statistics ? model.statistics.total_tests : '?'));
    _renderAllViews(model);
  }

  /** Build the full RFRunModel-equivalent from flat spans. */
  function _buildModel(spans) {
    // Execution attribute name (from server config)
    var _execAttr = window.__RF_EXECUTION_ATTRIBUTE__ || 'execution_id';

    // Index spans by span_id
    var byId = {};
    var i, span;
    for (i = 0; i < spans.length; i++) {
      span = spans[i];
      byId[span.span_id] = span;
    }

    // Classify spans
    var suiteSpans = [];   // has rf.suite.name
    var testSpans = [];    // has rf.test.name
    var kwSpans = [];      // has rf.keyword.name
    var signalSpans = [];  // has rf.signal
    var rootSpans = [];    // no parent or parent not in set

    for (i = 0; i < spans.length; i++) {
      span = spans[i];
      var attrs = span.attributes;
      if (attrs['rf.signal']) {
        signalSpans.push(span);
      } else if (attrs['rf.suite.name']) {
        suiteSpans.push(span);
      } else if (attrs['rf.test.name']) {
        testSpans.push(span);
      } else if (attrs['rf.keyword.name']) {
        kwSpans.push(span);
      }
    }

    // Build parent → children map
    var childrenOf = {}; // parent_span_id → [span]
    for (i = 0; i < spans.length; i++) {
      span = spans[i];
      var pid = span.parent_span_id;
      if (pid) {
        if (!childrenOf[pid]) childrenOf[pid] = [];
        childrenOf[pid].push(span);
      }
    }

    // Detect in-progress items from signal spans
    var inProgress = {}; // span_id → signal type
    for (i = 0; i < signalSpans.length; i++) {
      var sig = signalSpans[i];
      var sigType = sig.attributes['rf.signal'];
      // Signal spans reference the item they're about via parent_span_id
      // or via rf.test.id / rf.suite.id attribute
      var targetId = sig.attributes['rf.test.id'] || sig.attributes['rf.suite.id'] || sig.parent_span_id;
      if (targetId && (sigType === 'test.starting' || sigType === 'suite.starting')) {
        inProgress[targetId] = sigType;
      }
    }

    // Build keyword tree for a given parent span
    function buildKeywords(parentId) {
      var kids = childrenOf[parentId] || [];
      var result = [];
      for (var k = 0; k < kids.length; k++) {
        var child = kids[k];
        var ca = child.attributes;
        // Only include keyword spans (not signals)
        if (!ca['rf.keyword.name'] && !ca['rf.signal']) continue;
        if (ca['rf.signal']) continue;
        var kw = {
          name: ca['rf.keyword.name'] || child.name || '',
          keyword_type: ca['rf.keyword.type'] || 'KEYWORD',
          args: ca['rf.keyword.args'] || '',
          status: _mapStatus(child),
          start_time: child.start_time,
          end_time: child.end_time,
          elapsed_time: _elapsedMs(child.start_time, child.end_time),
          id: child.span_id,
          lineno: parseInt(ca['rf.keyword.lineno'] || '0', 10),
          doc: ca['rf.keyword.doc'] || '',
          status_message: ca['rf.status_message'] || '',
          events: _mapEvents(child.events),
          children: buildKeywords(child.span_id)
        };
        result.push(kw);
      }
      // Sort by start_time
      result.sort(function (a, b) { return a.start_time - b.start_time; });
      return result;
    }

    // Build tests for a suite span
    function buildTests(suiteSpanId) {
      var kids = childrenOf[suiteSpanId] || [];
      var tests = [];
      for (var t = 0; t < kids.length; t++) {
        var child = kids[t];
        var ca = child.attributes;
        if (!ca['rf.test.name']) continue;
        var testStatus = _mapStatus(child);
        // Check if in progress
        if (inProgress[child.span_id]) {
          testStatus = 'RUNNING';
        }
        var test = {
          name: ca['rf.test.name'] || child.name || '',
          id: child.span_id,
          status: testStatus,
          start_time: child.start_time,
          end_time: child.end_time,
          elapsed_time: _elapsedMs(child.start_time, child.end_time),
          keywords: buildKeywords(child.span_id),
          tags: _parseTags(ca['rf.test.tags']),
          doc: ca['rf.test.doc'] || '',
          status_message: ca['rf.status_message'] || '',
          execution_id: ca[_execAttr] || '',
          attributes: ca
        };
        tests.push(test);
      }
      tests.sort(function (a, b) { return a.start_time - b.start_time; });
      return tests;
    }

    // Build suite tree recursively
    function buildSuite(suiteSpan) {
      var sa = suiteSpan.attributes;
      var suiteStatus = _mapStatus(suiteSpan);
      if (inProgress[suiteSpan.span_id]) {
        suiteStatus = 'RUNNING';
      }
      var children = [];
      // Child suites
      var kids = childrenOf[suiteSpan.span_id] || [];
      for (var c = 0; c < kids.length; c++) {
        var child = kids[c];
        var ca = child.attributes;
        if (ca['rf.suite.name']) {
          children.push(buildSuite(child));
        }
      }
      // Tests (as children)
      var tests = buildTests(suiteSpan.span_id);
      for (var t = 0; t < tests.length; t++) {
        children.push(tests[t]);
      }
      // Suite-level keywords (setup/teardown)
      var suiteKws = [];
      for (var k = 0; k < kids.length; k++) {
        var kChild = kids[k];
        var ka = kChild.attributes;
        if (ka['rf.keyword.name'] && !ka['rf.test.name'] && !ka['rf.suite.name']) {
          suiteKws.push({
            name: ka['rf.keyword.name'] || kChild.name || '',
            keyword_type: ka['rf.keyword.type'] || 'KEYWORD',
            args: ka['rf.keyword.args'] || '',
            status: _mapStatus(kChild),
            start_time: kChild.start_time,
            end_time: kChild.end_time,
            elapsed_time: _elapsedMs(kChild.start_time, kChild.end_time),
            id: kChild.span_id,
            lineno: parseInt(ka['rf.keyword.lineno'] || '0', 10),
            doc: ka['rf.keyword.doc'] || '',
            status_message: ka['rf.status_message'] || '',
            events: _mapEvents(kChild.events),
            children: buildKeywords(kChild.span_id)
          });
        }
      }
      // Merge suite-level keywords into children
      children = suiteKws.concat(children);
      children.sort(function (a, b) { return (a.start_time || 0) - (b.start_time || 0); });

      return {
        name: sa['rf.suite.name'] || suiteSpan.name || '',
        id: suiteSpan.span_id,
        source: sa['rf.suite.source'] || '',
        status: suiteStatus,
        start_time: suiteSpan.start_time,
        end_time: suiteSpan.end_time,
        elapsed_time: _elapsedMs(suiteSpan.start_time, suiteSpan.end_time),
        doc: sa['rf.suite.doc'] || '',
        metadata: {},
        children: children,
        execution_id: sa[_execAttr] || '',
        attributes: sa
      };
    }

    // Find root suites (suites with no parent or parent not in our set)
    var rootSuites = [];
    for (i = 0; i < suiteSpans.length; i++) {
      span = suiteSpans[i];
      if (!span.parent_span_id || !byId[span.parent_span_id]) {
        rootSuites.push(buildSuite(span));
      }
    }

    // Prune empty root suites: if a root suite has 0 children (no tests,
    // no sub-suites, no keywords), it's likely a container suite whose
    // children are separate root spans (common in RF tracer output).
    // Remove these empty shells to avoid confusing the tree view.
    rootSuites = rootSuites.filter(function (s) {
      return s.children && s.children.length > 0;
    });

    rootSuites.sort(function (a, b) { return (a.start_time || 0) - (b.start_time || 0); });

    // Compute statistics
    var stats = _computeStatistics(rootSuites);

    // Extract metadata from resource attributes of first span
    var serviceName = '';
    var rfVersion = '';
    var runId = '';
    if (spans.length > 0) {
      var firstAttrs = spans[0].attributes;
      serviceName = firstAttrs['service.name'] || '';
      rfVersion = firstAttrs['rf.version'] || '';
      runId = firstAttrs['rf.run_id'] || '';
    }

    // Compute overall time range
    var minStart = Infinity;
    var maxEnd = 0;
    for (i = 0; i < spans.length; i++) {
      if (spans[i].start_time && spans[i].start_time < minStart) minStart = spans[i].start_time;
      if (spans[i].end_time && spans[i].end_time > maxEnd) maxEnd = spans[i].end_time;
    }
    if (minStart === Infinity) minStart = 0;

    return {
      title: serviceName || 'RF Trace Report',
      run_id: runId,
      rf_version: rfVersion,
      start_time: minStart,
      end_time: maxEnd,
      suites: rootSuites,
      statistics: stats
    };
  }

  /* ── helpers ────────────────────────────────────────────────────── */

  /** Count total spans in a model (suites + tests + keywords). */
  function _countModelSpans(model) {
    var count = 0;
    var stack = (model.suites || []).slice();
    while (stack.length > 0) {
      var item = stack.pop();
      count++;
      if (item.children) {
        for (var i = 0; i < item.children.length; i++) stack.push(item.children[i]);
      }
      if (item.keywords) {
        for (var j = 0; j < item.keywords.length; j++) stack.push(item.keywords[j]);
      }
    }
    return count;
  }

  /** Map rf.status attribute or OTLP status code → PASS/FAIL/SKIP/NOT_RUN. */
  function _mapStatus(span) {
    var rfStatus = span.attributes['rf.status'];
    if (rfStatus) {
      var upper = String(rfStatus).toUpperCase();
      if (upper === 'PASS') return 'PASS';
      if (upper === 'FAIL') return 'FAIL';
      if (upper === 'SKIP') return 'SKIP';
      if (upper === 'NOT_RUN' || upper === 'NOT RUN') return 'NOT_RUN';
      return upper;
    }
    // Fall back to OTLP status code
    if (span.status_code === 'STATUS_CODE_OK') return 'PASS';
    if (span.status_code === 'STATUS_CODE_ERROR') return 'FAIL';
    return 'NOT_RUN';
  }

  /** Elapsed time in milliseconds from nanosecond timestamps. */
  function _elapsedMs(startNano, endNano) {
    if (!startNano || !endNano) return 0;
    return (endNano - startNano) / 1e6;
  }

  /** Parse tags from a comma-separated string or array. */
  function _parseTags(val) {
    if (!val) return [];
    if (Array.isArray(val)) return val;
    if (typeof val === 'string') {
      return val.split(',').map(function (t) { return t.trim(); }).filter(Boolean);
    }
    return [];
  }

  /** Map raw events to the format views expect. */
  function _mapEvents(rawEvents) {
    if (!rawEvents || !rawEvents.length) return [];
    var out = [];
    for (var i = 0; i < rawEvents.length; i++) {
      var ev = rawEvents[i];
      out.push({
        name: ev.name || '',
        time: ev.time || 0,
        attributes: ev.attributes || {}
      });
    }
    return out;
  }

  /** Compute statistics from suite tree. */
  function _computeStatistics(suites) {
    var totalTests = 0;
    var passed = 0;
    var failed = 0;
    var skipped = 0;
    var totalDurationMs = 0;
    var suiteStats = [];

    function walkSuite(suite) {
      var sPassed = 0;
      var sFailed = 0;
      var sSkipped = 0;
      var sTotal = 0;

      var children = suite.children || [];
      for (var i = 0; i < children.length; i++) {
        var child = children[i];
        // If it has keywords array, it's a test; if it has children and no keywords, it's a suite
        if (child.keywords !== undefined) {
          // It's a test
          sTotal++;
          totalTests++;
          var st = child.status;
          if (st === 'PASS') { passed++; sPassed++; }
          else if (st === 'FAIL') { failed++; sFailed++; }
          else if (st === 'SKIP') { skipped++; sSkipped++; }
          else if (st === 'RUNNING') { /* count as in-progress, not in pass/fail/skip */ }
          else { skipped++; sSkipped++; }
          totalDurationMs += child.elapsed_time || 0;
        } else if (child.children !== undefined && child.keywords === undefined) {
          // It's a nested suite
          walkSuite(child);
        }
      }

      suiteStats.push({
        suite_name: suite.name,
        total: sTotal,
        passed: sPassed,
        failed: sFailed,
        skipped: sSkipped
      });
    }

    for (var i = 0; i < suites.length; i++) {
      walkSuite(suites[i]);
    }

    return {
      total_tests: totalTests,
      passed: passed,
      failed: failed,
      skipped: skipped,
      total_duration_ms: Math.round(totalDurationMs * 100) / 100,
      suite_stats: suiteStats
    };
  }

  /** Return a minimal empty model so app.js can build the DOM. */
  function _emptyModel() {
    return {
      title: 'RF Trace Report',
      run_id: '',
      rf_version: '',
      start_time: 0,
      end_time: 0,
      suites: [],
      statistics: {
        total_tests: 0,
        passed: 0,
        failed: 0,
        skipped: 0,
        total_duration_ms: 0,
        suite_stats: []
      }
    };
  }

  /* ── 7. View re-rendering ──────────────────────────────────────── */

  function _renderAllViews(model) {
    var suiteCount = (model.suites || []).length;
    var newSpanCount = _countModelSpans(model);
    console.log('[live] _renderAllViews: suites=' + suiteCount + ', modelSpans=' + newSpanCount);

    // Tree
    var treePanel = document.querySelector('.panel-tree');
    if (treePanel && typeof renderTree === 'function') {
      renderTree(treePanel, model);
    }

    // Report page
    if (typeof window.updateReportPage === 'function') {
      window.updateReportPage(model);
    }

    // Timeline — init once with real data, then use incremental updates.
    // In live mode, app.js skips initTimeline (empty model), so we do the
    // first init here when data arrives. Subsequent polls use updateTimelineData
    // to preserve zoom/pan state.
    var timelineSection = document.querySelector('.timeline-section');
    if (timelineSection) {
      if (!_timelineInitialized && suiteCount > 0 && typeof window.initTimeline === 'function') {
        console.log('[live] First timeline init with ' + suiteCount + ' suites');
        _loadWindowState.executionStartTime = model.start_time / 1e9;
        _loadWindowState.activeWindowStart = _loadWindowState.executionStartTime - _loadWindowState.stepSize;
        _loadWindowState.totalCachedSpans = allSpans.length;
        window.initTimeline(timelineSection, model);
        _timelineInitialized = true;
      } else if (_timelineInitialized && typeof window.updateTimelineData === 'function') {
        window.updateTimelineData(model);
      }
    }

    // Keyword stats — now rendered inside Report page via updateReportPage()

    // Search / filter — always re-init in live mode when data changes.
    var filterContent = document.querySelector('.panel-filter .filter-content');
    if (filterContent && typeof window.initSearch === 'function' && newSpanCount > 0) {
      if (newSpanCount !== _lastFilterSpanCount) {
        console.log('[live] Re-initializing filter: spanCount', _lastFilterSpanCount, '->', newSpanCount);
        window.initSearch(filterContent, model);
        _lastFilterSpanCount = newSpanCount;
      }
    }

    // Flow table
    var flowTableSection = document.querySelector('.flow-table-section');
    if (flowTableSection && typeof window.initFlowTable === 'function') {
      window.initFlowTable(flowTableSection, model);
    }

    // Notify event bus
    if (window.RFTraceViewer && window.RFTraceViewer.emit) {
      window.RFTraceViewer.emit('live-update', { model: model });
    }
  }

  /* ── 8. Service filter ────────────────────────────────────────── */

  function _createServiceFilter(header) {
    _serviceDropdownEl = document.createElement('div');
    _serviceDropdownEl.className = 'service-filter';

    var btn = document.createElement('button');
    btn.className = 'service-filter-btn';
    btn.textContent = 'Services';
    btn.setAttribute('aria-expanded', 'false');
    btn.setAttribute('aria-haspopup', 'true');

    var dropdown = document.createElement('div');
    dropdown.className = 'service-filter-dropdown';
    dropdown.style.display = 'none';

    _svcListEl = document.createElement('div');
    _svcListEl.className = 'service-filter-list';

    var emptyMsg = document.createElement('div');
    emptyMsg.className = 'service-filter-empty';
    emptyMsg.textContent = 'Waiting for spans\u2026';
    _svcListEl.appendChild(emptyMsg);

    dropdown.appendChild(_svcListEl);
    _serviceDropdownEl.appendChild(btn);
    _serviceDropdownEl.appendChild(dropdown);
    header.appendChild(_serviceDropdownEl);

    // Seed the default service as pre-checked
    if (_defaultService) {
      _knownServices[_defaultService] = true;
      _activeServices[_defaultService] = true;
      _getServiceState(_defaultService).enabled = true;
      _serviceFilter = _defaultService;
      _renderServiceList();
    }

    // Also seed from URL param if different
    var urlSvc = '';
    try { urlSvc = new URLSearchParams(window.location.search).get('service') || ''; } catch (e) {}
    if (urlSvc && !_knownServices[urlSvc]) {
      _knownServices[urlSvc] = true;
      _activeServices[urlSvc] = true;
      _getServiceState(urlSvc).enabled = true;
      _serviceFilter = _getActiveServiceFilter();
      _renderServiceList();
    }

    btn.addEventListener('click', function (e) {
      e.stopPropagation();
      var open = dropdown.style.display !== 'none';
      dropdown.style.display = open ? 'none' : 'block';
      btn.setAttribute('aria-expanded', open ? 'false' : 'true');
    });

    // Close on outside click
    document.addEventListener('click', function (e) {
      if (!_serviceDropdownEl.contains(e.target)) {
        dropdown.style.display = 'none';
        btn.setAttribute('aria-expanded', 'false');
      }
    });
  }

  function _onServiceDiscovered(svcName) {
    // Initialize service state if not already tracked
    var state = _getServiceState(svcName);
    if (svcName === _defaultService) {
      _activeServices[svcName] = true;
      state.enabled = true;
    }
    _renderServiceList();
    _updateServiceBtnLabel();
  }

  function _renderServiceList() {
    if (!_svcListEl) return;
    _svcListEl.innerHTML = '';

    var names = Object.keys(_knownServices).sort();
    if (names.length === 0) {
      var empty = document.createElement('div');
      empty.className = 'service-filter-empty';
      empty.textContent = 'Waiting for spans\u2026';
      _svcListEl.appendChild(empty);
      return;
    }

    for (var i = 0; i < names.length; i++) {
      (function (name) {
        var state = _getServiceState(name);
        var label = document.createElement('label');
        label.className = 'service-filter-item';

        var cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.value = name;
        cb.checked = state.enabled;

        cb.addEventListener('change', function () {
          _recordToggle(name);

          // If thrash-locked, ignore the toggle action (but it was recorded)
          var st = _getServiceState(name);
          if (st.thrashLocked) {
            // Revert checkbox to current state
            cb.checked = st.enabled;
            return;
          }

          if (cb.checked) {
            _toggleServiceOn(name);
          } else {
            _toggleServiceOff(name);
          }
        });

        var nameSpan = document.createElement('span');
        nameSpan.textContent = name;

        label.appendChild(cb);
        label.appendChild(nameSpan);

        // Status badge
        var badge = _deriveServiceBadge(state);
        if (badge) {
          var badgeEl = document.createElement('span');
          badgeEl.className = 'service-status-badge';
          badgeEl.textContent = badge;
          badgeEl.style.cssText = 'margin-left:6px;font-size:11px;opacity:0.7;';
          label.appendChild(badgeEl);
        }

        _svcListEl.appendChild(label);
      })(names[i]);
    }
  }

  function _deriveServiceBadge(state) {
    if (state.thrashLocked) return 'Stabilizing\u2026';
    if (state.pendingEnableFetch && state.graceTimer) {
      // Compute remaining grace seconds from stored timestamps
      var remaining = 0;
      if (state.graceStartedAt && state.graceDuration) {
        remaining = Math.max(0, Math.ceil((state.graceStartedAt + state.graceDuration - Date.now()) / 1000));
      }
      return 'Pending (' + remaining + ' s)';
    }
    if (!state.enabled && state.evictionTimer) {
      // Compute remaining eviction seconds from disabledSince (30s timer)
      var evictRemaining = 0;
      if (state.disabledSince) {
        evictRemaining = Math.max(0, Math.ceil((state.disabledSince + 30000 - Date.now()) / 1000));
      }
      return 'Evicting in ' + evictRemaining + ' s';
    }
    if (state.enabled && state.cachedSpanCount > 0) {
      return 'Enabled (' + state.cachedSpanCount + ' spans cached)';
    }
    if (!state.enabled && !state.evictionTimer) {
      return 'Disabled';
    }
    return '';
  }

  function _getActiveServiceFilter() {
    var active = Object.keys(_activeServices);
    // No services checked → send a sentinel that matches nothing
    // so the server returns zero spans (true filter behavior)
    if (active.length === 0) return '__none__';
    if (active.length === 1) return active[0];
    // Multiple services: pass comma-separated (server-side will need to handle)
    // For now, send the first one — server only supports single service filter
    return active[0];
  }

  function _updateServiceBtnLabel() {
      if (!_serviceDropdownEl) return;
      var btn = _serviceDropdownEl.querySelector('.service-filter-btn');
      if (!btn) return;
      var active = Object.keys(_activeServices);
      var total = Object.keys(_knownServices).length;
      if (active.length === 0) {
        btn.textContent = 'Services';
        btn.classList.remove('has-filter');
      } else if (active.length === 1) {
        btn.textContent = active[0];
        btn.classList.add('has-filter');
      } else {
        btn.textContent = active.length + '/' + total + ' services';
        btn.classList.add('has-filter');
      }
    }

  function _resetAndRepoll() {
    // Reset state and re-fetch from scratch with new service filter
    allSpans = [];
    seenSpanIds = {};
    lastSeenNs = 0;
    _spanCapReached = false;
    _lastFilterSpanCount = 0;
    _timelineInitialized = false;

    // Re-apply lookback
    if (_lookbackNs > 0 && provider === 'signoz') {
      var nowNs = Date.now() * 1e6;
      lastSeenNs = Math.max(0, nowNs - _lookbackNs);
    }

    // Immediate re-poll
    if (!_paused) {
      _poll();
    }
  }

  /* ── 9. Status bar ─────────────────────────────────────────────── */

  function _createStatusBar() {
      var header = document.querySelector('.viewer-header');
      if (!header) return;

      if (provider === 'signoz') {
        _createServiceFilter(header);
      }
    }

  /* ── 9. SigNoz helpers ─────────────────────────────────────────── */

  function _reschedulePolling(intervalMs) {
    _stopPolling();
    pollTimer = setInterval(_poll, intervalMs);
  }

  function _showNotification(msg) {
      var header = document.querySelector('.viewer-header');
      if (!header) return;
      var note = header.querySelector('.live-notification');
      if (!note) {
        note = document.createElement('span');
        note.className = 'live-notification';
        header.appendChild(note);
      }
      note.textContent = msg;
      // Auto-clear after 10 seconds
      clearTimeout(note._clearTimer);
      note._clearTimer = setTimeout(function () {
        note.textContent = '';
      }, 10000);
    }

  /* ── Auth error banner ─────────────────────────────────────────── */

  var _authErrorBannerEl = null;

  function _showAuthError(msg) {
    // Stop polling — no point retrying with bad auth
    _stopPolling();

    if (_authErrorBannerEl) {
      // Update existing banner message
      var msgEl = _authErrorBannerEl.querySelector('.auth-error-msg');
      if (msgEl) msgEl.textContent = msg;
      return;
    }

    var viewer = document.querySelector('.rf-trace-viewer');
    if (!viewer) return;

    _authErrorBannerEl = document.createElement('div');
    _authErrorBannerEl.className = 'auth-error-banner';
    _authErrorBannerEl.style.cssText =
      'background:#d32f2f;color:#fff;padding:12px 16px;font-size:14px;' +
      'display:flex;align-items:center;gap:12px;justify-content:space-between;';

    var msgSpan = document.createElement('span');
    msgSpan.className = 'auth-error-msg';
    msgSpan.textContent = msg;
    _authErrorBannerEl.appendChild(msgSpan);

    var retryBtn = document.createElement('button');
    retryBtn.textContent = 'Retry';
    retryBtn.style.cssText =
      'background:#fff;color:#d32f2f;border:none;padding:4px 12px;border-radius:3px;' +
      'cursor:pointer;font-weight:bold;white-space:nowrap;';
    retryBtn.addEventListener('click', function () {
      _clearAuthError();
      _startPolling();
      _poll();
    });
    _authErrorBannerEl.appendChild(retryBtn);

    viewer.insertBefore(_authErrorBannerEl, viewer.firstChild);
  }

  function _clearAuthError() {
    if (_authErrorBannerEl) {
      _authErrorBannerEl.remove();
      _authErrorBannerEl = null;
    }
  }

  /* ── 9. Span cap enforcement ───────────────────────────────────── */

  function _onSpanCapReached() {

  /**
   * Render a sparkline SVG polyline inside the given container element.

  function renderSparkline(container, dataPoints) {
    // Clear previous content
    container.innerHTML = '';

    if (!dataPoints || dataPoints.length < 2) {
      var placeholder = document.createElement('span');
      placeholder.className = 'sh-sparkline-nodata';
      placeholder.textContent = 'No data';
      container.appendChild(placeholder);
      return;
    }

    var width = 120;
    var height = 32;
    var padding = 2;

    var svg = document.createElementNS(SVG_NS, 'svg');
    svg.setAttribute('width', width);
    svg.setAttribute('height', height);

    svg.setAttribute('class', 'sh-sparkline-svg');
    svg.setAttribute('role', 'img');
    svg.setAttribute('aria-label', 'Sparkline trend');

    // Extract values

    for (var i = 0; i < dataPoints.length; i++) {
      values.push(dataPoints[i].v);

    var minVal = values[0];
    var maxVal = values[0];
    for (var j = 1; j < values.length; j++) {
      if (values[j] < minVal) minVal = values[j];
      if (values[j] > maxVal) maxVal = values[j];

    // Collect suite names recursively from suite tree
    function _collectSuiteNames(suites) {
      var results = [];
      var stack = suites ? suites.slice() : [];
      while (stack.length > 0) {
        var s = stack.pop();
        if (s.name) {
          results.push({ type: 'suite', name: s.name, id: s.id || '', context: '' });
        }
        var children = s.children || [];
        for (var ci = 0; ci < children.length; ci++) {
          // Only recurse into sub-suites (not tests)
          if (children[ci].children !== undefined && children[ci].keywords === undefined) {
            stack.push(children[ci]);
          }
        }
      }
      return results;
    }

    // Collect test case names from suite tree
    function _collectTestNames(suites) {
      var results = [];
      var stack = suites ? suites.slice() : [];
      while (stack.length > 0) {
        var s = stack.pop();
        var suiteName = s.name || '';
        var children = s.children || [];
        for (var ci = 0; ci < children.length; ci++) {
          var child = children[ci];
          if (child.keywords !== undefined) {
            // It's a test
            results.push({ type: 'test', name: child.name || '', id: child.id || '', context: suiteName });
          } else if (child.children !== undefined) {
            stack.push(child);
          }
        }
      }
      return results;
    }

    // Collect keyword names from suite tree (aggregated, unique)
    function _collectKeywordNames(suites) {
      var kwMap = {};
      var suiteStack = suites ? suites.slice() : [];
      while (suiteStack.length > 0) {
        var s = suiteStack.pop();
        var children = s.children || [];
        for (var ci = 0; ci < children.length; ci++) {
          var child = children[ci];
          if (child.keywords !== undefined) {
            // Walk keyword tree
            var kwStack = (child.keywords || []).slice();
            while (kwStack.length > 0) {
              var kw = kwStack.pop();
              if (kw.name && !kwMap[kw.name]) {
                kwMap[kw.name] = { type: 'keyword', name: kw.name, id: kw.id || '', context: '' };
              }
              var kwChildren = kw.children || [];
              for (var ki = 0; ki < kwChildren.length; ki++) {
                kwStack.push(kwChildren[ki]);
              }
            }
          } else if (child.children !== undefined) {
            suiteStack.push(child);
          }
        }
      }
      var results = [];
      for (var key in kwMap) {
        if (kwMap.hasOwnProperty(key)) {
          results.push(kwMap[key]);
        }
      }
      return results;
    }

    // Perform search across all data types
    function _performSearch(query) {
      if (!query) return null;
      var d = appState.data;
      if (!d) return { loading: true };

      var suites = d.suites || [];
      var lowerQuery = query.toLowerCase();
      var results = { suites: [], tests: [], keywords: [] };
      var cap = 50;

      // Search suites
      var allSuites = _collectSuiteNames(suites);
      for (var si = 0; si < allSuites.length && results.suites.length < cap; si++) {
        if (allSuites[si].name.toLowerCase().indexOf(lowerQuery) !== -1) {
          results.suites.push(allSuites[si]);
        }
      }

      // Search tests
      var allTests = _collectTestNames(suites);
      for (var ti = 0; ti < allTests.length && results.tests.length < cap; ti++) {
        if (allTests[ti].name.toLowerCase().indexOf(lowerQuery) !== -1) {
          results.tests.push(allTests[ti]);
        }
      }

      // Search keywords
      var allKeywords = _collectKeywordNames(suites);
      for (var ki = 0; ki < allKeywords.length && results.keywords.length < cap; ki++) {
        if (allKeywords[ki].name.toLowerCase().indexOf(lowerQuery) !== -1) {
          results.keywords.push(allKeywords[ki]);
        }
      }

      return results;
    }

    // Render search results dropdown
    function _renderSearchDropdown(results) {
      searchDropdown.innerHTML = '';

      if (!results) {

      if (results.loading) {
        var loadingEl = document.createElement('div');
        loadingEl.className = 'search-no-results';
        loadingEl.textContent = 'Loading\u2026';

      var totalCount = results.suites.length + results.tests.length + results.keywords.length;

      if (totalCount === 0) {

        noResults.className = 'search-no-results';
        noResults.textContent = 'No results';
        searchDropdown.appendChild(noResults);
        searchDropdown.style.display = '';

      var groups = [
        { label: 'Suites', items: results.suites },
        { label: 'Test Cases', items: results.tests },
        { label: 'Keywords', items: results.keywords }
      ];

      for (var gi = 0; gi < groups.length; gi++) {
        var group = groups[gi];
        if (group.items.length === 0) continue;

        var groupEl = document.createElement('div');
        groupEl.className = 'search-result-group';

        var groupHeader = document.createElement('div');
        groupHeader.className = 'search-result-group-header';
        groupHeader.textContent = group.label + ' (' + group.items.length + ')';
        groupEl.appendChild(groupHeader);

        for (var ii = 0; ii < group.items.length; ii++) {

          })(item));

          groupEl.appendChild(itemEl);
        }

        searchDropdown.appendChild(groupEl);
      }

      searchDropdown.style.display = '';

        var jhLabel = document.createElement('div');
        jhLabel.className = 'hd-card-label';
        jhLabel.textContent = jsHeapDef.label;
        var jhHint = document.createElement('span');
        jhHint.style.cssText = 'opacity:0.4;font-size:0.85em;margin-left:4px;text-transform:none;';
        jhHint.textContent = '(client)';
        jhLabel.appendChild(jhHint);
        jhCard.appendChild(jhLabel);

        var jhValue = document.createElement('div');
        jhValue.className = 'hd-card-value';
        jhValue.textContent = '\u2014';
        jhCard.appendChild(jhValue);

        var jhCanvas = document.createElement('canvas');
        jhCanvas.className = 'hd-sparkline';
        jhCanvas.width = 200;
        jhCanvas.height = 48;
        jhCard.appendChild(jhCanvas);

        hdBody.appendChild(jhCard);
        _healthCharts[jsHeapDef.key] = { canvas: jhCanvas, valueEl: jhValue, def: jsHeapDef, data: [] };
      }

      healthDashboard.appendChild(hdBody);
      healthDashboard.classList.add('open'); // start expanded
      root.appendChild(healthDashboard);

      // ── Sparkline renderer ──
      function _drawSparkline(chartObj, refValues) {
        var canvas = chartObj.canvas;
        var ctx = canvas.getContext('2d');
        var w = canvas.width;
        var h = canvas.height;
        var data = chartObj.data;
        var pad = 2;

        ctx.clearRect(0, 0, w, h);

        if (data.length < 2) {
          ctx.fillStyle = 'var(--text-muted, #999)';
          ctx.font = '10px sans-serif';
          ctx.fillText('waiting for data\u2026', 4, h / 2 + 3);
          return;
        }

        // Compute Y range
        var minY = Infinity, maxY = -Infinity;
        for (var i = 0; i < data.length; i++) {
          if (data[i] < minY) minY = data[i];
          if (data[i] > maxY) maxY = data[i];
        }
        // Include ref lines in range
        if (refValues) {
          for (var ri = 0; ri < refValues.length; ri++) {
            if (refValues[ri] != null) {
              if (refValues[ri] > maxY) maxY = refValues[ri];
              if (refValues[ri] < minY) minY = refValues[ri];
            }
          }
        }
        if (maxY === minY) { maxY = minY + 1; }
        // Always anchor Y-axis at 0 for all metrics so sparklines
        // don't mislead when values are constant or near-constant.
        if (minY > 0) minY = 0;
        if (maxY === 0) maxY = 1;
        var rangeY = maxY - minY;

        // Draw filled area
        var stepX = (w - pad * 2) / (data.length - 1);
        ctx.beginPath();
        ctx.moveTo(pad, h - pad);
        for (var j = 0; j < data.length; j++) {
          var x = pad + j * stepX;
          var y = h - pad - ((data[j] - minY) / rangeY) * (h - pad * 2);
          ctx.lineTo(x, y);
        }
        ctx.lineTo(pad + (data.length - 1) * stepX, h - pad);
        ctx.closePath();

        // Use CSS custom property or fallback
        var computedStyle = getComputedStyle(canvas);
        var strokeColor = computedStyle.getPropertyValue('--sh-sparkline-stroke').trim() || '#2563eb';
        ctx.fillStyle = strokeColor + '22';
        ctx.fill();

        // Draw line
        ctx.beginPath();
        for (var k = 0; k < data.length; k++) {
          var lx = pad + k * stepX;
          var ly = h - pad - ((data[k] - minY) / rangeY) * (h - pad * 2);
          if (k === 0) ctx.moveTo(lx, ly);
          else ctx.lineTo(lx, ly);
        }
        ctx.strokeStyle = strokeColor;
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Draw reference lines (dashed)
        if (refValues) {
          var refColors = ['#f59e0b', '#ef4444'];
          for (var rr = 0; rr < refValues.length; rr++) {
            if (refValues[rr] == null) continue;
            var ry = h - pad - ((refValues[rr] - minY) / rangeY) * (h - pad * 2);
            ctx.beginPath();
            ctx.setLineDash([3, 3]);
            ctx.moveTo(pad, ry);
            ctx.lineTo(w - pad, ry);
            ctx.strokeStyle = refColors[rr % refColors.length];
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.setLineDash([]);
          }
        }
      }

      // ── Poll /api/v1/resources/history ──
      var _hdSid = window.__RF_SESSION_ID__ || 'xxxxxxxx'.replace(/x/g, function () {
        return Math.floor(Math.random() * 16).toString(16);
      });
      function _pollHealthDashboard() {
        fetch('/api/v1/resources/history?sid=' + _hdSid)
          .then(function (res) { return res.ok ? res.json() : null; })
          .then(function (resp) {
            if (!resp || !resp.snapshots) return;
            var snaps = resp.snapshots;

            // Extract series for each chart
            for (var key in _healthCharts) {
              if (!_healthCharts.hasOwnProperty(key)) continue;
              var chart = _healthCharts[key];
              var series = [];
              var durationSec = 0;

              if (key === 'spansPerSec') {
                // spansPerSec comes from live connection state (client-side
                // ingestion rate), not from server snapshots.
                var connState = window.RFTraceViewer && window.RFTraceViewer.getConnectionState
                  ? window.RFTraceViewer.getConnectionState() : null;
                var val = connState ? connState[key] : null;
                chart.data.push(val != null ? val : 0);
                if (chart.data.length > 360) chart.data.shift();
                series = chart.data;
                durationSec = (series.length - 1) * 10;
              } else {
                // All other metrics (rss_mb, cpu_pct, active_users,
                // total_spans) come from server resource snapshots.
                // This keeps them independent of timeline time-range
                // navigation — pressing 7d or any preset has zero
                // effect on these charts.
                series = [];
                for (var si = 0; si < snaps.length; si++) {
                  var v = snaps[si][key];
                  series.push(v != null ? v : 0);
                }
                chart.data = series;
                durationSec = (snaps.length - 1) * 10;
              }

              // Update current value display
              var latest = series.length > 0 ? series[series.length - 1] : null;
              if (latest != null) {
                var formatted = chart.def.unit
                  ? (Math.round(latest * 10) / 10) + ' ' + chart.def.unit
                  : (key === 'total_spans' ? Math.round(latest).toLocaleString()
                    : key === 'active_users' ? Math.round(latest).toString()
                    : (Math.round(latest * 10) / 10).toString());
                chart.valueEl.textContent = formatted;
              }

              // Compute reference line values
              var refs = [];
              if (chart.def.refLines && snaps.length > 0) {
                var lastSnap = snaps[snaps.length - 1];
                for (var rl = 0; rl < chart.def.refLines.length; rl++) {
                  var refKey = chart.def.refLines[rl];
                  if (refKey === 'cpu_limit_pct') {
                    // Convert cpu_limit_mc to percentage (limit_mc / 10 = % of 1 core)
                    var limMc = lastSnap.cpu_limit_mc;
                    refs.push(limMc != null ? limMc / 10 : null);
                  } else {
                    refs.push(lastSnap[refKey] != null ? lastSnap[refKey] : null);
                  }
                }
              }

              _drawSparkline(chart, refs);

              // Update duration hint in label
              if (durationSec > 0) {
                var durationLabel = durationSec >= 3600
                  ? Math.round(durationSec / 3600) + 'hr'
                  : durationSec >= 60
                  ? Math.round(durationSec / 60) + 'min'
                  : durationSec + 's';
                var labelEl = chart.canvas.parentElement.querySelector('.hd-card-label');
                if (labelEl) {
                  var durationSpan = labelEl.querySelector('.hd-duration');
                  if (!durationSpan) {
                    durationSpan = document.createElement('span');
                    durationSpan.className = 'hd-duration';
                    durationSpan.style.cssText = 'opacity:0.4;font-size:0.8em;margin-left:4px;text-transform:none;';
                    labelEl.appendChild(durationSpan);
                  }
                  durationSpan.textContent = '(' + durationLabel + ')';
                }
              }
            }

            // ── Client-side JS Heap sampling (Chromium only) ──
            if (typeof performance !== 'undefined' && performance.memory && _healthCharts['js_heap_mb']) {
              var jhChart = _healthCharts['js_heap_mb'];
              var heapMb = performance.memory.usedJSHeapSize / (1024 * 1024);
              var heapLimitMb = performance.memory.jsHeapSizeLimit / (1024 * 1024);
              jhChart.data.push(heapMb);
              if (jhChart.data.length > 360) jhChart.data.shift();
              jhChart.valueEl.textContent = (Math.round(heapMb * 10) / 10) + ' MB';
              _drawSparkline(jhChart, [heapLimitMb]);

              var jhDurSec = (jhChart.data.length - 1) * 10;
              if (jhDurSec > 0) {
                var jhDurLabel = jhDurSec >= 3600
                  ? Math.round(jhDurSec / 3600) + 'hr'
                  : jhDurSec >= 60
                  ? Math.round(jhDurSec / 60) + 'min'
                  : jhDurSec + 's';
                var jhLabelEl = jhChart.canvas.parentElement.querySelector('.hd-card-label');
                if (jhLabelEl) {
                  var jhDurSpan = jhLabelEl.querySelector('.hd-duration');
                  if (!jhDurSpan) {
                    jhDurSpan = document.createElement('span');
                    jhDurSpan.className = 'hd-duration';
                    jhDurSpan.style.cssText = 'opacity:0.4;font-size:0.8em;margin-left:4px;text-transform:none;';
                    jhLabelEl.appendChild(jhDurSpan);
                  }
                  jhDurSpan.textContent = '(' + jhDurLabel + ')';
                }
              }
            }
          })
          .catch(function () { /* silent */ });
      }

      // Start polling when dashboard is visible
      _pollHealthDashboard();
      _healthPollTimer = setInterval(_pollHealthDashboard, 10000);

      // Wire green dot click to also toggle health dashboard
      if (typeof statusCluster !== 'undefined') {
        statusDot.addEventListener('click', function (e) {
          e.stopPropagation();
          var isOpen = healthDashboard.classList.contains('open');
          if (isOpen) {
            healthDashboard.classList.remove('open');
            hdToggle.textContent = '\u25bc';
          } else {
            healthDashboard.classList.add('open');
            hdToggle.textContent = '\u25b2';
          }
        });
      }
    }

    // Tab navigation
    var tabNav = document.createElement('nav');
    tabNav.className = 'tab-nav';
    
    var tabs = [
      { id: 'explorer', label: 'Explorer' },
      { id: 'report', label: 'Report' }
    ];
    
    tabs.forEach(function(tab) {
      var tabBtn = document.createElement('button');
      tabBtn.className = 'tab-btn';
      tabBtn.textContent = tab.label;
      tabBtn.setAttribute('data-tab', tab.id);
      if (tab.id === 'explorer') {
        tabBtn.classList.add('active');
      }
      tabBtn.addEventListener('click', function() {
        _switchTab(tab.id);
      });
      tabNav.appendChild(tabBtn);
    });
    
    root.appendChild(tabNav);

    // Tab content container
    var tabContent = document.createElement('div');
    tabContent.className = 'tab-content';
    root.appendChild(tabContent);

    // Explorer tab (timeline + tree + filters, no stats)
    var explorerTab = document.createElement('div');
    explorerTab.className = 'tab-pane active';
    explorerTab.setAttribute('data-tab-pane', 'explorer');
    
    var body = document.createElement('div');
    body.className = 'viewer-body';

    // Center column: timeline + tree
    var centerColumn = document.createElement('div');
    centerColumn.className = 'panel-center';
    
    var timelineSection = document.createElement('section');
    timelineSection.className = 'timeline-section';
    timelineSection.style.height = '300px';
    timelineSection.style.borderBottom = '1px solid var(--border-color)';
    centerColumn.appendChild(timelineSection);

    // Resize handle between timeline and tree
    var resizeHandle = document.createElement('div');
    resizeHandle.className = 'timeline-resize-handle';
    resizeHandle.setAttribute('aria-label', 'Drag to resize timeline height');
    centerColumn.appendChild(resizeHandle);

    (function () {
      var startY = 0;
      var startH = 0;
      var dragging = false;

      resizeHandle.addEventListener('mousedown', function (e) {
        e.preventDefault();
        dragging = true;
        startY = e.clientY;
        startH = timelineSection.offsetHeight;
        document.body.style.cursor = 'ns-resize';
        document.body.style.userSelect = 'none';
      });

      document.addEventListener('mousemove', function (e) {
        if (!dragging) return;
        var newH = Math.max(120, Math.min(startH + (e.clientY - startY), window.innerHeight - 200));
        timelineSection.style.height = newH + 'px';
        // Notify timeline to resize its canvases
        window.dispatchEvent(new Event('resize'));
      });

      document.addEventListener('mouseup', function () {
        if (!dragging) return;
        dragging = false;
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
      });
    })();

    var treePanel = document.createElement('main');
    treePanel.className = 'panel-tree';
    centerColumn.appendChild(treePanel);

    // Resize handle between tree and flow table
    var treeFlowHandle = document.createElement('div');
    treeFlowHandle.className = 'tree-flow-resize-handle';
    treeFlowHandle.setAttribute('aria-label', 'Drag to resize tree / flow table split');
    centerColumn.appendChild(treeFlowHandle);

    var flowTableSection = document.createElement('section');
    flowTableSection.className = 'flow-table-section';
    flowTableSection.style.height = '320px';
    centerColumn.appendChild(flowTableSection);

    (function () {
      var startY = 0;
      var startTreeH = 0;
      var startFlowH = 0;
      var dragging = false;

      treeFlowHandle.addEventListener('mousedown', function (e) {
        e.preventDefault();
        dragging = true;
        startY = e.clientY;
        startTreeH = treePanel.offsetHeight;
        startFlowH = flowTableSection.offsetHeight;
        document.body.style.cursor = 'ns-resize';
        document.body.style.userSelect = 'none';
      });

      document.addEventListener('mousemove', function (e) {
        if (!dragging) return;
        var dy = e.clientY - startY;
        var newTreeH = Math.max(80, startTreeH + dy);
        var newFlowH = Math.max(60, startFlowH - dy);
        treePanel.style.flex = 'none';
        treePanel.style.height = newTreeH + 'px';
        flowTableSection.style.height = newFlowH + 'px';
      });

      document.addEventListener('mouseup', function () {
        if (!dragging) return;
        dragging = false;
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
      });
    })();

    var filterSidebar = document.createElement('aside');
    filterSidebar.className = 'panel-filter';

    var filterToggle = document.createElement('button');
    filterToggle.className = 'filter-toggle-btn';
    filterToggle.setAttribute('aria-label', 'Toggle filters panel');
    filterToggle.textContent = '\u25b6 Filters';
    filterToggle.addEventListener('click', function () {
      var isCollapsed = filterSidebar.classList.toggle('collapsed');
      filterToggle.textContent = isCollapsed ? '\u25c0 Filters' : '\u25b6 Filters';
    });
    filterSidebar.appendChild(filterToggle);

    var filterContent = document.createElement('div');
    filterContent.className = 'filter-content';
    filterSidebar.appendChild(filterContent);

    body.appendChild(centerColumn);
    body.appendChild(filterSidebar);
    explorerTab.appendChild(body);

    // Report tab (consolidated test report view)
    var reportTab = document.createElement('div');
    reportTab.className = 'tab-pane';
    reportTab.setAttribute('data-tab-pane', 'report');
    var reportContainer = document.createElement('div');
    reportContainer.className = 'report-page';
    reportTab.appendChild(reportContainer);
    
    tabContent.appendChild(reportTab);
    tabContent.appendChild(explorerTab);

    // Initialize views
    _initializeViews(data);

    // Central cross-view navigation coordinator
    // All views emit 'navigate-to-span' and this routes to all views
    eventBus.on('navigate-to-span', function (data) {
      if (!data || !data.spanId) return;
      var source = data.source || '';

      // Highlight in tree (unless the event came from tree)
      if (source !== 'tree' && typeof window.highlightNodeInTree === 'function') {
        window.highlightNodeInTree(data.spanId);
      }

      // Highlight in timeline (unless the event came from timeline)
      if (source !== 'timeline' && typeof window.highlightSpanInTimeline === 'function') {
        // Auto-compact when navigating from the report page
        if (source === 'report' && typeof window.triggerTimelineCompact === 'function') {
          window.triggerTimelineCompact();
          setTimeout(function () {
            window.highlightSpanInTimeline(data.spanId);
          }, 60);
        } else {
          window.highlightSpanInTimeline(data.spanId);
        }
      }

      // Highlight in keyword stats (unless the event came from keyword-stats)
      if (source !== 'keyword-stats' && typeof window.highlightSpanInKeywordStats === 'function') {
        window.highlightSpanInKeywordStats(data.spanId);
      }
    });

    // Bridge legacy span-selected events to navigate-to-span
    eventBus.on('span-selected', function (data) {
      if (data && data.spanId) {
        eventBus.emit('navigate-to-span', { spanId: data.spanId, source: data.source || '' });
      }
    });

    // Bridge keyword-selected to navigate to the first span of that keyword
    eventBus.on('keyword-selected', function (data) {
      if (data && data.spanIds && data.spanIds.length > 0) {
        eventBus.emit('navigate-to-span', { spanId: data.spanIds[0], source: 'keyword-stats' });
      }
    });

    // Emit app-ready event
    eventBus.emit('app-ready', { data: data });

    // Start background paged fetch for SigNoz provider (non-live mode)
    if (_provider === 'signoz' && !window.__RF_TRACE_LIVE__) {
      _startBackgroundFetch();
    }
  }

  /**
   * Initialize all views with data.
   */
  function _initializeViews(data) {
    var isLive = !!window.__RF_TRACE_LIVE__;

    // Initialize filter/search view in right sidebar
    // In live mode, skip — live.js _renderAllViews will init with real data
    var filterContent = document.querySelector('.panel-filter .filter-content');
    if (filterContent && typeof window.initSearch === 'function' && !isLive) {
      window.initSearch(filterContent, data);
    }

    // Initialize timeline view (always visible at top)
    // In live mode, skip — live.js _renderAllViews will init with real data
    if (typeof window.initTimeline === 'function' && !isLive) {
      var timelineSection = document.querySelector('.timeline-section');
      if (timelineSection) {
        window.initTimeline(timelineSection, data);
      }
    }

    // Initialize tree view
    var treePanel = document.querySelector('.panel-tree');
    if (treePanel && typeof renderTree === 'function') {
      renderTree(treePanel, data);
    }

    // Initialize Report page
    if (typeof window.initReportPage === 'function') {
      var reportContainer = document.querySelector('.report-page');
      if (reportContainer) {
        window.initReportPage(reportContainer, data);
      }
    }

    // Initialize flow table view
    var flowTableSection = document.querySelector('.flow-table-section');
    if (flowTableSection && typeof window.initFlowTable === 'function') {
      window.initFlowTable(flowTableSection, data);
    }

    // Initialize deep link system (last, so all views are ready for state restore)
    if (typeof window.initDeepLink === 'function') {
      window.initDeepLink();
    }
  }

  /** Detect OS color scheme preference. */
  function _detectTheme() {
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      return 'dark';
    }
    return 'light';
  }

  /** Apply theme class to root element. */
  function _applyTheme(root, theme) {
    root.classList.remove('theme-dark', 'theme-light');
    root.classList.add('theme-' + theme);
  }

  /** Switch between tabs. */
  function _switchTab(tabId) {
    // Backward compatibility: map old tab IDs to new ones
    if (tabId === 'overview') tabId = 'explorer';
    if (tabId === 'statistics') tabId = 'report';

    // Update tab buttons
    var tabBtns = document.querySelectorAll('.tab-btn');
    tabBtns.forEach(function(btn) {
      if (btn.getAttribute('data-tab') === tabId) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    });
    
    // Update tab panes
    var tabPanes = document.querySelectorAll('.tab-pane');
    tabPanes.forEach(function(pane) {
      if (pane.getAttribute('data-tab-pane') === tabId) {
        pane.classList.add('active');
      } else {
        pane.classList.remove('active');
      }
    });
    
    eventBus.emit('tab-changed', { tabId: tabId });
  }
})();

</script>
</body>
</html>
