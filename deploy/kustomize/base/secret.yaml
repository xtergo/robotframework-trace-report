# Secret reference for sensitive values.
# Create this secret before deploying:
#   kubectl create secret generic trace-report-secrets \
#     --from-literal=SIGNOZ_API_KEY=<your-api-key> \
#     --from-literal=SIGNOZ_JWT_SECRET=<your-jwt-secret> \
#     --from-literal=SIGNOZ_ENDPOINT=<your-signoz-endpoint>
apiVersion: v1
kind: Secret
metadata:
  name: trace-report-secrets
  labels:
    app.kubernetes.io/name: trace-report
type: Opaque
# Data fields are intentionally empty — users must create this secret
# with their own values before deployment.
# Required keys:
#   SIGNOZ_API_KEY     - SigNoz API key (or use SIGNOZ_JWT_SECRET for self-hosted)
#   SIGNOZ_JWT_SECRET  - JWT signing secret for self-hosted SigNoz auto-auth
#   SIGNOZ_ENDPOINT    - SigNoz endpoint URL (e.g. https://signoz.example.com)
stringData: {}
