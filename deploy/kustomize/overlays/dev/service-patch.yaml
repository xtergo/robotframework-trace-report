# Dev overlay: expose trace-report via NodePort for Kind cluster access.
# Kind's extraPortMappings maps hostPort 8077 → nodePort 30077.
apiVersion: v1
kind: Service
metadata:
  name: trace-report
spec:
  type: NodePort
  ports:
    - name: http
      port: 8077
      targetPort: http
      protocol: TCP
      nodePort: 30077
