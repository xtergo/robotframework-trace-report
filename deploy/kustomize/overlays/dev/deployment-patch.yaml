apiVersion: apps/v1
kind: Deployment
metadata:
  name: trace-report
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: trace-report
          # Dev resource profile — lower than prod
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
