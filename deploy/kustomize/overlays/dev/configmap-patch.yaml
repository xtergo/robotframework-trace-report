apiVersion: v1
kind: ConfigMap
metadata:
  name: trace-report-config
data:
  # Dev-specific overrides
  LOG_FORMAT: "json"
  STATUS_POLL_INTERVAL: "15"
  HEALTH_CHECK_TIMEOUT: "2"
  CLICKHOUSE_HOST: "clickhouse"
  CLICKHOUSE_PORT: "8123"
  MAX_SPANS_PER_PAGE: "10000"
  MAX_SPANS: "500000"
  EXECUTION_ATTRIBUTE: "essvt.execution_id"
  PORT: "8077"
  POLL_INTERVAL: "5"
  # Rate limiting for dev (generous)
  RATE_LIMIT_PER_IP: "120"
  # Max concurrent queries
  MAX_CONCURRENT_QUERIES: "5"
  # Test base filter config with excluded-by-default and hard-blocked services
  BASE_FILTER_CONFIG: |
    {
      "excluded_by_default": ["internal-telemetry-collector"],
      "hard_blocked": ["debug-profiler"]
    }
