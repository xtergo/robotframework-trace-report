# Optional: Horizontal Pod Autoscaler (default disabled).
# Uncomment in kustomization.yaml to enable.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: trace-report
  labels:
    app.kubernetes.io/name: trace-report
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: trace-report
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
